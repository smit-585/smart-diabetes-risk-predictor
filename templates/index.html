<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🩺 Diabetes Risk Predictor</h1>
        <p class="subtitle">Enter the patient details to predict diabetes risk</p>

        <form action="/predict" method="post">
            <div class="form-group">
                <label>Pregnancies</label>
                <input type="number" name="pregnancies" min="0" max="20" required>
            </div>

            <div class="form-group">
                <label>Glucose Level</label>
                <input type="number" name="glucose" min="0" max="200" required>
            </div>

            <div class="form-group">
                <label>Blood Pressure</label>
                <input type="number" name="bp" min="40" max="130" required>
            </div>

            <div class="form-group">
                <label>Skin Thickness</label>
                <input type="number" name="skin" min="0" max="100" required>
            </div>

            <div class="form-group">
                <label>Insulin</label>
                <input type="number" name="insulin" min="0" max="900" required>
            </div>

            <div class="form-group">
                <label>BMI</label>
                <input type="number" step="0.1" name="bmi" min="10" max="50" required>
            </div>

            <div class="form-group">
                <label>Diabetes Pedigree Function</label>
                <input type="number" step="0.01" name="dpf" min="0" max="2.5" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" min="10" max="100" required>
            </div>

            <button type="submit">Predict Risk</button>
        </form>

        {% if result is defined %}
            <div class="result">
                {% if result == 1 %}
                    <p class="high-risk">❌ High Risk of Diabetes ({{ prob }}%)</p>
                {% else %}
                    <p class="low-risk">✅ Low Risk of Diabetes ({{ prob }}%)</p>
                {% endif %}
            </div>
        {% endif %}

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}
    </div>
</body>
</html>
